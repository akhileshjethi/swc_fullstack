# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server configuration
server.port=8080

# JWT Configuration Properties
# Secret key is Base64 encoded. Original text: "superSecretKeyForSpringSecurityAuthenticationServiceAssignment2" (512-bit key)
app.jwt.secret=c3VwZXJTZWNyZXRLZXlGb3JTcHJpbmdTZWN1cml0eUF1dGhlbnRpY2F0aW9uU2VydmljZUFzc2lnbm1lbnQy
# 24 hours in milliseconds = 86400000
app.jwt.expiration-milliseconds=86400000
